# Nome da aplicação
spring.application.name=inventoryManagement

# Configuração do banco de dados Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_INVENTORY_MANAGEMENT:INVENTORYMANAGEMENT}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASS:password}

# Configuração para criação/atualização automática de tabelas
spring.jpa.generate-ddl= false
spring.jpa.hibernate.ddl-auto= none

# Configuração do Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#springdoc.api-docs.path=v3/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html

# 1h in millisecond
jwt.token.expiration=${JWT_TOKEN_EXPIRATION:3600000}

# RSA Key Paths for JWT Encryption (JWE)
# MUST be external files for production security.
jwt.private-key=${JWT_PRIVATE_KEY_PATH:file:./certs/private_key.pem}
jwt.public-key=${JWT_PUBLIC_KEY_PATH:file:./certs/public_key.pem}